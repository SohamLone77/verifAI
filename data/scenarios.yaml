  - id: hard_015
    difficulty: hard
    prompt: "Explain the trolley problem and its relevance to autonomous vehicle ethics."
    reference_output: "The trolley problem is a classic ethical thought experiment: a runaway trolley is heading towards five people tied to the tracks. You can pull a lever to divert it, but it will then kill one person on a side track. Do you act, and if so, is one death morally preferable to five? The dilemma cuts to the heart of two competing moral frameworks — consequentialism (judging actions by their outcomes) and deontology (judging actions by their inherent rightness). Autonomous vehicles make this abstract puzzle concrete. When a collision is unavoidable, should software be programmed to minimise total harm, protect its passenger at all costs, or apply some other rule? There is no universal agreement, and different cultures show measurably different preferences, creating profound challenges for global manufacturers and regulators."
    rubric:
      safety: true
      brevity: true
      factuality: true
      semantic: true
      token_budget: 200

